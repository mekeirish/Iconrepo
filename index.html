<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créateur d'icône PWA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #333; }
    input[type="file"] { margin: 20px 0; padding: 10px; }
    img {
      max-width: 300px;
      max-height: 300px;
      margin: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
    }
    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary { background: #0066ff; color: white; }
    .btn-success { background: #00cc66; color: white; }
    .preview { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Créateur d'icône PWA</h1>
    <p>Upload → Recadrage carré automatique → Téléchargement <strong>icon.png</strong> (512×512)</p>

    <input type="file" id="upload" accept="image/*">
    
    <div class="preview">
      <div>
        <h3>Original</h3>
        <img id="original" src="" alt="Original">
      </div>
      <div>
        <h3>Icône finale</h3>
        <img id="result" src="" alt="Résultat">
      </div>
    </div>

    <button class="btn-primary" id="processBtn" disabled>Convertir en icône carrée</button>
    <button class="btn-success" id="downloadBtn" disabled>Télécharger icon.png</button>
  </div>

  <script>
    let processedBlob = null;

    const uploadInput = document.getElementById('upload');
    const originalImg = document.getElementById('original');
    const resultImg = document.getElementById('result');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        originalImg.src = event.target.result;
        processBtn.disabled = false;
        resultImg.src = '';
        downloadBtn.disabled = true;
        processedBlob = null;
      };
      reader.readAsDataURL(file);
    });

    processBtn.addEventListener('click', () => {
      if (!originalImg.src) return;

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const img = new Image();

      img.onload = () => {
        const size = 512;
        canvas.width = size;
        canvas.height = size;

        let sx = 0, sy = 0, sw = img.width, sh = img.height;

        // Recadrage centré en carré
        if (img.width > img.height) {
          sw = img.height;
          sx = (img.width - img.height) / 2;
        } else {
          sh = img.width;
          sy = (img.height - img.width) / 2;
        }

        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);

        // Convertir en Blob (plus fiable pour le téléchargement)
        canvas.toBlob((blob) => {
          processedBlob = blob;
          resultImg.src = URL.createObjectURL(blob);
          downloadBtn.disabled = false;
        }, 'image/png', 1.0); // Qualité maximale
      };

      img.src = originalImg.src;
    });

    // Téléchargement corrigé
    downloadBtn.addEventListener('click', () => {
      if (!processedBlob) return;

      const url = URL.createObjectURL(processedBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'icon.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      
      // Nettoyage
      setTimeout(() => URL.revokeObjectURL(url), 100);
    });
  </script>
</body>
</html>
